[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -p no:cacheprovider --basetemp=.pytest_tmp
markers =
    smoke: szybkie testy sprawdzające, czy podstawowe scenariusze działają
    regression: testy regresyjne dla logiki pamięci, Sandmana, duplikatów i konfliktów
    slow: wolniejsze testy lub scenariusze z większą liczbą kroków
